<main class="login-shell">
  <section class="login-card">
    <h1 class="login-title">Entrar</h1>

    @if (globalError()) {
      <div class="alert alert-error" role="alert">{{ globalError() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <fieldset [disabled]="loading()">

        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="seu@email.com"
            [class.field-invalid]="emailError"
            aria-describedby="email-error"
          />
          @if (emailError) {
            <span id="email-error" class="field-error" role="alert">{{ emailError }}</span>
          }
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
            [class.field-invalid]="passwordError"
            aria-describedby="password-error"
          />
          @if (passwordError) {
            <span id="password-error" class="field-error" role="alert">{{ passwordError }}</span>
          }
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="loading()">
          @if (loading()) { Entrando... } @else { Entrar }
        </button>

      </fieldset>
    </form>

    @if (hasMicrosoft()) {
      <div class="divider"><span>ou</span></div>
      <button type="button" class="btn btn-microsoft" (click)="onMicrosoftLogin()">
        Entrar com Microsoft
      </button>
    }
  </section>
</main>
