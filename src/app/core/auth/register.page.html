<main class="login-shell">
  <section class="login-card">
    <h1 class="login-title">Criar conta</h1>

    @if (globalError()) {
      <div class="alert alert-error" role="alert">{{ globalError() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <fieldset [disabled]="loading()">

        <div class="field">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="seu@email.com"
            [class.field-invalid]="emailError"
            aria-describedby="email-error"
          />
          @if (emailError) {
            <span id="email-error" class="field-error" role="alert">{{ emailError }}</span>
          }
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            autocomplete="new-password"
            placeholder="••••••••"
            [class.field-invalid]="passwordError"
            aria-describedby="password-error"
          />
          @if (passwordError) {
            <span id="password-error" class="field-error" role="alert">{{ passwordError }}</span>
          }
        </div>

        <div class="field">
          <label for="firstName">Nome</label>
          <input
            id="firstName"
            type="text"
            formControlName="firstName"
            autocomplete="given-name"
            placeholder="Seu nome"
            [class.field-invalid]="firstNameError"
            aria-describedby="firstName-error"
          />
          @if (firstNameError) {
            <span id="firstName-error" class="field-error" role="alert">{{ firstNameError }}</span>
          }
        </div>

        <div class="field">
          <label for="lastName">Sobrenome</label>
          <input
            id="lastName"
            type="text"
            formControlName="lastName"
            autocomplete="family-name"
            placeholder="Seu sobrenome"
            [class.field-invalid]="lastNameError"
            aria-describedby="lastName-error"
          />
          @if (lastNameError) {
            <span id="lastName-error" class="field-error" role="alert">{{ lastNameError }}</span>
          }
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="loading()">
          @if (loading()) { Criando conta... } @else { Criar conta }
        </button>

      </fieldset>
    </form>

    <p class="register-link">
      Já tem uma conta? <a routerLink="/login">Entrar</a>
    </p>
  </section>
</main>
